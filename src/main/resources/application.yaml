spring:
  application:
    name: LMS
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true # Əgər köhnə cədvəllər varsa və flyway sonradan qoşulubsa, bunu etmək vacibdir
    locations: classpath:db/migration
  web:
    cors:
      allowed-origins:
        - "http://localhost:3000"
        - "http://localhost:4200"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600
  config:
    import: optional:file:.env[.properties]
  # Email Configuration (Bura köçürüldü)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:900000}
    refresh-secret: ${JWT_REFRESH_SECRET}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  password-reset:
    expiration-minutes: ${PASSWORD_RESET_EXPIRATION_MINUTES:60}

# Swagger/SpringDoc Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: false

# Logging
logging:
  level:
    root: INFO
    com.example: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"