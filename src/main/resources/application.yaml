spring:
  application:
    name: LMS
  datasource:
    url: jdbc:mysql://213.199.37.210:3306/llm?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: user
    password: LlmUser123!
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.format_sql: true
  web:
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:4200"
      allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

# JWT Configuration
app:
  jwt:
    secret: "MySecretKeyForJWTTokenGenerationAndValidationThatIsAtLeast256BitsLongForHS256Algorithm"
    expiration: 86400000  # 24 hours in milliseconds

# Swagger/SpringDoc Configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operationsSorter: method
    tagsSorter: alpha
  api-docs:
    path: /v3/api-docs
  show-actuator: false

# Logging
logging:
  level:
    root: INFO
    com.example: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

